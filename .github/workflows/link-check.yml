name: Frontend predeploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  predeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/Frontend/package-lock.json

      - name: Install Frontend deps
        working-directory: apps/Frontend
        run: npm ci

      - name: Predeploy (build CSS bundle + link check)
        working-directory: apps/Frontend
        run: npm run predeploy
